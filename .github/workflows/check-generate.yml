name: Check Generated Files

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: read
    outputs:
      image: ${{ steps.docker-image.outputs.image }}
      modified: ${{ steps.docker-image.outputs.modified }}
      is_fork: ${{ steps.docker-image.outputs.is_fork }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Docker image
        id: docker-image
        run: |
          IS_FORK="${{ github.event.pull_request.head.repo.fork }}"
          echo "is_fork=${IS_FORK}" >> $GITHUB_OUTPUT

          # Check if gen.Dockerfile or build workflow was modified
          git fetch --depth=1 origin ${{ github.base_ref }}
          if git diff --name-only FETCH_HEAD..HEAD | grep -E '^(gen\.Dockerfile|Dockerfile\.ci|\.github/workflows/build-ci-image\.yml)$'; then
            echo "modified=true" >> $GITHUB_OUTPUT
            echo "image=ghcr.io/flyteorg/flyte/ci:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "📦 gen.Dockerfile modified - will use PR-specific image"
          else
            echo "modified=false" >> $GITHUB_OUTPUT
            echo "image=ghcr.io/flyteorg/flyte/ci:v2" >> $GITHUB_OUTPUT
            echo "📦 Using default v2 image"
          fi

      - name: Wait for Docker image build workflow
        if: steps.docker-image.outputs.modified == 'true' && steps.docker-image.outputs.is_fork != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 60; // 20 minutes max
            const delaySeconds = 20;

            console.log('⏳ Waiting for Docker image build workflow to complete...');

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
              // Get workflow runs for this PR
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build-ci-image.yml',
                event: 'pull_request',
                per_page: 10
              });

              // Find the run for this PR
              const prRun = runs.workflow_runs.find(run =>
                run.head_sha === context.payload.pull_request.head.sha
              );

              if (prRun) {
                console.log(`Found workflow run: ${prRun.html_url}`);
                console.log(`Status: ${prRun.status}, Conclusion: ${prRun.conclusion}`);

                if (prRun.status === 'completed') {
                  if (prRun.conclusion === 'success') {
                    console.log('✅ Docker image build completed successfully!');
                    return;
                  } else {
                    core.setFailed(`❌ Docker image build failed with conclusion: ${prRun.conclusion}`);
                    return;
                  }
                }

                console.log(`Attempt ${attempt + 1}/${maxAttempts}: Build still running, waiting ${delaySeconds} seconds...`);
              } else {
                console.log(`Attempt ${attempt + 1}/${maxAttempts}: Build not started yet, waiting ${delaySeconds} seconds...`);
              }

              await new Promise(resolve => setTimeout(resolve, delaySeconds * 1000));
            }

            core.setFailed('❌ Timeout waiting for Docker image build to complete');

        # build image locally if the PR is from fork repo
      - name: Set up Docker Buildx (fork PR)
        if: steps.docker-image.outputs.modified == 'true' && steps.docker-image.outputs.is_fork == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build CI Docker image locally (fork PR)
        if: steps.docker-image.outputs.modified == 'true' && steps.docker-image.outputs.is_fork == 'true'
        run: |
          docker build -f gen.Dockerfile \
            --cache-from ghcr.io/flyteorg/flyte/ci:v2 \
            -t ${{ steps.docker-image.outputs.image }} \
            .

      - name: Save and compress Docker image (fork PR)
        if: steps.docker-image.outputs.modified == 'true' && steps.docker-image.outputs.is_fork == 'true'
        run: |
          docker save ${{ steps.docker-image.outputs.image }} -o /tmp/ci-image.tar
          gzip /tmp/ci-image.tar

      - name: Upload Docker image artifact (fork PR)
        if: steps.docker-image.outputs.modified == 'true' && steps.docker-image.outputs.is_fork == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-docker-image
          path: /tmp/ci-image.tar.gz
          retention-days: 1

  check-generate:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact (fork PR)
        if: needs.setup.outputs.is_fork == 'true' && needs.setup.outputs.modified == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ci-docker-image
          path: /tmp

      # According the PR is from fork repo or not, select either the local mirror or the ghcr.io mirror.
      - name: Set up Docker image
        run: |
          if [ "${{ needs.setup.outputs.is_fork }}" = "true" ] && [ "${{ needs.setup.outputs.modified }}" = "true" ]; then
            gunzip /tmp/ci-image.tar.gz
            docker load -i /tmp/ci-image.tar
          else
            docker pull ${{ needs.setup.outputs.image }}
          fi

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/cargo-registry
            ${{ runner.temp }}/cargo-git
            ${{ runner.temp }}/cargo-target
          key: check-gen-cargo-${{ needs.setup.outputs.image }}-${{ hashFiles('gen/rust/Cargo.lock') }}
          restore-keys: |
            check-gen-cargo-${{ needs.setup.outputs.image }}-

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/uv-venv
          key: check-gen-uv-${{ needs.setup.outputs.image }}-${{ hashFiles('gen/python/uv.lock') }}
          restore-keys: |
            check-gen-uv-${{ needs.setup.outputs.image }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ${{ runner.temp }}/cargo-registry ${{ runner.temp }}/cargo-git
          mkdir -p ${{ runner.temp }}/cargo-target ${{ runner.temp }}/uv-venv

      - name: Run buf generation and checks
        env:
          IMAGE: ${{ needs.setup.outputs.image }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -v "${{ runner.temp }}/cargo-registry:/root/.cargo/registry" \
            -v "${{ runner.temp }}/cargo-git:/root/.cargo/git" \
            -v "${{ runner.temp }}/cargo-target:/cargo-target" \
            -v "${{ runner.temp }}/uv-venv:/uv-venv" \
            -e CARGO_HOME=/root/.cargo \
            -e RUSTUP_HOME=/root/.rustup \
            -e SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0 \
            -e UV_PROJECT_ENVIRONMENT=/uv-venv \
            -e CARGO_TARGET_DIR=/cargo-target \
            $IMAGE \
            bash -c "
              git config --global --add safe.directory $GITHUB_WORKSPACE &&
              cd gen/python && uv sync --all-groups --frozen && cd ../.. &&
              make buf
            "
          git diff --exit-code -- ':!gen/rust/Cargo.lock' ':!*/mocks/*' ':!*/gocachemocks/*' ':!go.mod' ':!go.sum' || \
            (echo 'Generated files are out of date. Run `make buf` and commit changes.' && exit 1)
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -v "${{ runner.temp }}/cargo-target:/cargo-target" \
            -e CARGO_HOME=/root/.cargo \
            -e RUSTUP_HOME=/root/.rustup \
            -e CARGO_TARGET_DIR=/cargo-target \
            $IMAGE \
            bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE && make check-crate"

  check-go-tidy:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact (fork PR)
        if: needs.setup.outputs.is_fork == 'true' && needs.setup.outputs.modified == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ci-docker-image
          path: /tmp

      # According the PR is from fork repo or not, select either the local mirror or the ghcr.io mirror.
      - name: Set up Docker image
        run: |
          if [ "${{ needs.setup.outputs.is_fork }}" = "true" ] && [ "${{ needs.setup.outputs.modified }}" = "true" ]; then
            gunzip /tmp/ci-image.tar.gz
            docker load -i /tmp/ci-image.tar
          else
            docker pull ${{ needs.setup.outputs.image }}
          fi

      - name: Run go mod tidy and check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ${{ needs.setup.outputs.image }} \
            bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE && make go-tidy"
          git diff --exit-code -- go.mod go.sum || \
            (echo 'go.mod/go.sum are out of date. Run `go mod tidy` and commit changes.' && exit 1)

  check-mocks:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact (fork PR)
        if: needs.setup.outputs.is_fork == 'true' && needs.setup.outputs.modified == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ci-docker-image
          path: /tmp

      # According the PR is from fork repo or not, select either the local mirror or the ghcr.io mirror.
      - name: Set up Docker image
        run: |
          if [ "${{ needs.setup.outputs.is_fork }}" = "true" ] && [ "${{ needs.setup.outputs.modified }}" = "true" ]; then
            gunzip /tmp/ci-image.tar.gz
            docker load -i /tmp/ci-image.tar
          else
            docker pull ${{ needs.setup.outputs.image }}
          fi

      - name: Run mockery and check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ${{ needs.setup.outputs.image }} \
            bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE && make mocks"
          git diff --exit-code -- '*/mocks/*' '*/gocachemocks/*' || \
            (echo 'Mock files are out of date. Run `make mocks` and commit changes.' && exit 1)
