name: Build and Publish CI Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'gen.Dockerfile'
      - '.github/workflows/build-ci-image.yml'
  pull_request_target:
    paths:
      - 'gen.Dockerfile'
      - '.github/workflows/build-ci-image.yml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild of the image'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ci
  DEPOT_PROJECT_ID: ${{ vars.DEPOT_PROJECT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      id-token: write  # required for Depot OIDC auth

    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Validate Depot project id
        run: |
          if [ -z "${DEPOT_PROJECT_ID}" ]; then
            echo "::error::DEPOT_PROJECT_ID repo variable is not set. Add it under Settings → Secrets and variables → Actions → Variables." >&2
            exit 1
          fi

      - name: Set up Depot
        uses: depot/setup-action@v1

      - name: Log in to GitHub Container Registry

        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Use branch name for branch pushes
            type=ref,event=branch
            # Use PR number for pull requests
            type=ref,event=pr
            # Use 'latest' tag for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Use 'v2' tag for v2 branch
            type=raw,value=v2,enable=${{ github.ref == 'refs/heads/v2' }}
            # Add git sha as tag
            type=sha,prefix=${{ github.head_ref }}-,enable=${{ github.ref != 'refs/heads/v2' && github.ref != 'refs/heads/main' }}

      - name: Set image tag output
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.event_name }}" == "pull_request_target" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/v2" ]; then
            echo "tag=v2" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${{ github.ref }} | sed 's/refs\/heads\///')" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: build
        uses: depot/build-push-action@v1
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          context: .
          file: ./gen.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Native multi-arch on Depot — no QEMU emulation.
          platforms: linux/amd64,linux/arm64
          # Layer cache is automatically persisted by Depot per project,
          # so no cache-from/cache-to plumbing is needed.

      - name: Image digest
        run: echo "Image built with digest ${{ steps.build.outputs.digest }}"

      - name: Comment on PR with image tag
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.set-tag.outputs.tag }}';
            const registry = '${{ env.REGISTRY }}';
            const imageName = '${{ env.IMAGE_NAME }}';
            const fullImage = `${registry}/${imageName}:${tag}`;

            const comment = `## 🐳 Docker CI Image Built

            The CI Docker image has been built and pushed for this PR!

            **Image:** \`${fullImage}\`

            This image will be automatically used by CI workflows in this PR.

            To test locally:
            \`\`\`bash
            make gen DOCKER_CI_IMAGE=${fullImage}
            \`\`\`
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🐳 Docker CI Image Built')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
