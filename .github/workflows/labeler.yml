name: "Pull Request Labeler"

on:
  # SAFE EXCEPTION: pull_request_target is safe here because
  # no untrusted code is checked out or executed. The labeler action
  # only reads changed files via GitHub API and applies text labels.
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false
