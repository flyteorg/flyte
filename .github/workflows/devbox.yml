# Functional tests against a devbox built from the PR's code, the backend is
# the variable under test and the SDK is pinned.
name: Devbox

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Pin the SDK so devbox failures always point at backend changes, not SDK drift.
  FLYTE_SDK_VERSION: "2.5.8"

jobs:
  devbox-functional-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The GHA runner has ~14GB free; the devbox image plus buildx cache
      # doesn't fit without reclaiming space first.
      - name: Reclaim disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # Exposes ACTIONS_RUNTIME_TOKEN so the Makefile's type=gha buildx cache works.
      - name: Expose GitHub Actions runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Build devbox image
        run: make devbox-build FLYTE_ARCHES=amd64

      - name: Prune buildx cache to reclaim storage
        run: docker buildx prune --all --force

      - name: Start devbox
        run: make devbox-run

      # The SDK needs more than the API: code bundles upload to rustfs and
      # task images resolve through the registry, so wait for every
      # deployment in the namespace, not just flyte-binary.
      - name: Wait for Flyte to be ready
        run: |
          timeout 300 bash -c 'until kubectl -n flyte get deployment flyte-binary >/dev/null 2>&1; do sleep 5; done'
          for d in $(kubectl -n flyte get deployments -o name); do
            kubectl -n flyte rollout status "$d" --timeout=600s
          done
          kubectl -n flyte get pods

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flyte-sdk
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system "flyte==${FLYTE_SDK_VERSION}"
          python -c "import flyte; print(flyte.__version__)"

      # Examples must match the installed SDK version, so check out the same tag.
      - name: Checkout flyte-sdk examples
        uses: actions/checkout@v4
        with:
          repository: flyteorg/flyte-sdk
          ref: v${{ env.FLYTE_SDK_VERSION }}
          path: flyte-sdk

      # The config lives inside the SDK checkout because the example driver
      # chdirs there (code bundle module names derive from the working directory).
      - name: Configure SDK for devbox
        working-directory: flyte-sdk
        run: |
          flyte create config \
            --output .flyte/config.yaml \
            --endpoint localhost:30080 \
            --project flytesnacks \
            --domain development \
            --builder local \
            --insecure

      - name: Run SDK examples
        run: python .github/scripts/devbox_sdk_examples.py flyte-sdk
