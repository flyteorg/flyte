name: Build & Push Flytecopilot Image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Publish-only: runs from trusted refs (main / manual dispatch) so the build
# never executes untrusted PR code while Depot OIDC + GHCR creds are in scope
# (avoids the pull_request_target "pwn-request" class of attack).
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPOT_PROJECT_ID: ${{ vars.DEPOT_PROJECT_ID }}

jobs:
  build-and-push-flytecopilot-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Depot OIDC auth (GHCR auth uses FLYTE_BOT_PAT)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Validate Depot project id
        run: |
          if [ -z "${DEPOT_PROJECT_ID}" ]; then
            echo "::error::DEPOT_PROJECT_ID repo variable is not set. Add it under Settings → Secrets and variables → Actions → Variables." >&2
            exit 1
          fi
      - name: Setup Golang caches
        uses: actions/cache@v4
        with:
          path: |
            /root/.cache/go-build
            /root/go/pkg/mod
          key: ${{ runner.os }}-golang-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-
      - name: Set version
        run: |
          echo "FLYTE_VERSION=${{ github.sha }}" >> $GITHUB_ENV
      - name: Prepare Image Names
        id: image-names
        uses: docker/metadata-action@v3
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/flytecopilot
          tags: |
            type=raw,value=nightly,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=long
      - name: Set up Depot
        uses: depot/setup-action@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ secrets.FLYTE_BOT_USERNAME }}"
          password: "${{ secrets.FLYTE_BOT_PAT }}"
      - name: Build and push Image
        uses: depot/build-push-action@v1
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          context: .
          # Native multi-arch on Depot — no QEMU.
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.image-names.outputs.tags }}
          build-args: |
            FLYTE_VERSION=${{ env.FLYTE_VERSION }}
          file: Dockerfile.flytecopilot
          push: true
