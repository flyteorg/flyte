name: Build & Push Flytecopilot Image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Publishing runs only from trusted refs (push to main / manual dispatch) so
# the build never executes untrusted PR code while Depot OIDC + GHCR creds are
# in scope (avoids the pull_request_target "pwn-request" class of attack).
# PRs that touch the image build get a credential-free, push-free validation
# build instead (plain pull_request, runs in the PR's own context — no secrets).
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/flytecopilot.yml
  workflow_dispatch:

env:
  DEPOT_PROJECT_ID: ${{ vars.DEPOT_PROJECT_ID }}

jobs:
  # PR validation: build the image but never push. No registry/OIDC creds, so
  # it is safe to run against untrusted fork PR code.
  build-flytecopilot-image:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          # Single-arch is enough to validate the build on PRs.
          platforms: linux/amd64
          file: Dockerfile
          target: flytecopilot
          push: false

  build-and-push-flytecopilot-image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Depot OIDC auth (GHCR auth uses FLYTE_BOT_PAT)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Validate Depot project id
        run: |
          if [ -z "${DEPOT_PROJECT_ID}" ]; then
            echo "::error::DEPOT_PROJECT_ID repo variable is not set. Add it under Settings → Secrets and variables → Actions → Variables." >&2
            exit 1
          fi
      - name: Setup Golang caches
        uses: actions/cache@v4
        with:
          path: |
            /root/.cache/go-build
            /root/go/pkg/mod
          key: ${{ runner.os }}-golang-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-
      - name: Set version
        run: |
          echo "FLYTE_VERSION=${{ github.sha }}" >> $GITHUB_ENV
      - name: Prepare Image Names
        id: image-names
        uses: docker/metadata-action@v3
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/flytecopilot
          tags: |
            type=raw,value=nightly,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=long
      - name: Set up Depot
        uses: depot/setup-action@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ secrets.FLYTE_BOT_USERNAME }}"
          password: "${{ secrets.FLYTE_BOT_PAT }}"
      - name: Build and push Image
        uses: depot/build-push-action@v1
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          context: .
          # Native multi-arch on Depot — no QEMU.
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.image-names.outputs.tags }}
          build-args: |
            FLYTE_VERSION=${{ env.FLYTE_VERSION }}
          file: Dockerfile
          target: flytecopilot
          push: true
