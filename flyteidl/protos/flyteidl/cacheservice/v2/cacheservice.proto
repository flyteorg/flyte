syntax = "proto3";

package flyteidl.cacheservice.v2;

option go_package = "github.com/flyteorg/flyte/flyteidl/gen/pb-go/flyteidl/cacheservice/v2";

import "flyteidl/core/identifier.proto";
import "flyteidl/cacheservice/cacheservice.proto";
import "validate/validate.proto";


/*
 * CacheService defines operations for cache management including retrieval, storage, and deletion of cached task/workflow outputs.
 */
service CacheService {
  // Retrieves cached data by key.
  rpc Get (GetCacheRequest) returns (flyteidl.cacheservice.GetCacheResponse);

  // Stores or updates cached data by key.
  rpc Put (PutCacheRequest) returns (flyteidl.cacheservice.PutCacheResponse);

  // Deletes cached data by key.
  rpc Delete (DeleteCacheRequest) returns (flyteidl.cacheservice.DeleteCacheResponse);

  // Get or extend a reservation for a cache key
  rpc GetOrExtendReservation (GetOrExtendReservationRequest) returns (flyteidl.cacheservice.GetOrExtendReservationResponse);

  // Release the reservation for a cache key
  rpc ReleaseReservation (ReleaseReservationRequest) returns (flyteidl.cacheservice.ReleaseReservationResponse);
}

/*
 * Identifier for cache operations, including org, project, and domain.
 * This is used to scope cache operations to specific organizational contexts.
 */
message Identifier {
  string org = 1 [(validate.rules).string.min_len = 1]; // Organization identifier
  string project = 2 [(validate.rules).string.min_len = 1]; // Project identifier
  string domain = 3 [(validate.rules).string.min_len = 1]; // Domain identifier
}

/*
 * Request to retrieve cached data by key.
 */
message GetCacheRequest {
  flyteidl.cacheservice.GetCacheRequest base_request = 1;
  Identifier identifier = 2 [(validate.rules).message.required = true]; // Identifier for the cache operation
}

/*
 * Request to store/update cached data by key.
 */
message PutCacheRequest {
  flyteidl.cacheservice.PutCacheRequest base_request = 1;
  Identifier identifier = 2 [(validate.rules).message.required = true]; // Identifier for the cache operation
}

/*
 * Request to delete cached data by key.
 */
message DeleteCacheRequest {
  flyteidl.cacheservice.DeleteCacheRequest base_request = 1;
  Identifier identifier = 2 [(validate.rules).message.required = true]; // Identifier for the cache operation
}

/*
 * Request to get or extend a reservation for a cache key
 */
message GetOrExtendReservationRequest {
  flyteidl.cacheservice.GetOrExtendReservationRequest base_request = 1;
  Identifier identifier = 2 [(validate.rules).message.required = true]; // Identifier for the cache operation
}

/*
 * Request to release the reservation for a cache key
 */
message ReleaseReservationRequest {
  flyteidl.cacheservice.ReleaseReservationRequest base_request = 1;
  Identifier identifier = 2 [(validate.rules).message.required = true]; // Identifier for the cache operation
}
