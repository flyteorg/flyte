apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "flyte-demo.persistence.minioVolumeName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "flyte-demo.labels" . | nindent 4 }}
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  hostPath:
    path: "/var/lib/flyte/storage/minio"
