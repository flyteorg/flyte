{{- if .Values.console.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flyte-binary.console.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-binary.console.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- tpl ( .Values.commonLabels | toYaml ) . | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- tpl ( .Values.commonAnnotations | toYaml ) . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.console.replicaCount }}
  selector:
    matchLabels: {{- include "flyte-binary.console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "flyte-binary.console.selectorLabels" . | nindent 8 }}
        {{- if .Values.console.podLabels }}
        {{- tpl ( .Values.console.podLabels | toYaml ) . | nindent 8 }}
        {{- end }}
      {{- if .Values.console.podAnnotations }}
      annotations: {{- tpl ( .Values.console.podAnnotations | toYaml ) . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.console.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: console
          image: "{{ .Values.console.image.repository }}:{{ .Values.console.image.tag }}"
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.console.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.console.basePath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.console.basePath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.console.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.console.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.console.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.console.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.console.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
