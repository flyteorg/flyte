                format: int32
                type: integer
              cacheStatus:
                description: CacheStatus is the latest observed cache lookup result
                  for this action.
                format: int32
                type: integer
              conditions:
                description: |-
                  conditions represent the current state of the TaskAction resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              errorState:
                description: |-
                  ErrorState is the structured error from the last failed/aborted attempt.
                  Populated when the plugin returns a core.ExecutionError; preserves the
                  Code field that ActionEvent.ErrorInfo cannot carry.
                properties:
                  code:
                    description: |-
                      Code is the plugin-defined error code (e.g. "OOMKilled",
                      "ContainerCreating", "PrimaryContainerNotFound").
                    type: string
                  kind:
                    description: 'Kind is the error kind: "USER", "SYSTEM", or ""
                      (unspecified).'
                    type: string
                  message:
                    description: Message is the human-readable error message.
                    type: string
                type: object
              phaseHistory:
                description: |-
                  PhaseHistory is an append-only log of phase transitions. Unlike conditions
                  (which are updated in-place by type), this preserves the full timeline:
                  Queued → Initializing → Executing → Succeeded/Failed, each with a timestamp.
                items:
                  description: PhaseTransition records a phase change with its timestamp.
                  properties:
                    message:
                      description: Message is an optional human-readable message about
                        the transition.
                      type: string
                    occurredAt:
                      description: OccurredAt is when this phase transition happened.
                      format: date-time
                      type: string
                    phase:
                      description: Phase is the phase that was entered (e.g. "Queued",
                        "Initializing", "Executing", "Succeeded", "Failed").
                      type: string
                  required:
                  - occurredAt
                  - phase
                  type: object
                type: array
              pluginPhase:
                description: PluginPhase is a human-readable representation of the
                  plugin's current phase.
                type: string
              pluginPhaseVersion:
                description: PluginPhaseVersion is the version of the current plugin
                  phase.
                format: int32
                type: integer
              pluginState:
                description: PluginState is the Gob-encoded plugin state from the
                  last reconciliation round.
                format: byte
                type: string
              pluginStateVersion:
                description: PluginStateVersion tracks the version of the plugin state
                  schema for compatibility.
                type: integer
              stateJson:
                description: StateJSON is the JSON serialized NodeStatus that was
                  last sent to the State Service
                type: string
              systemFailures:
                description: |-
                  SystemFailures counts system-level failures observed during reconciliation —
                  either Go errors returned from Plugin.Handle (e.g. transient k8s API errors,
                  admission webhook denials) or plugin transitions reporting a system-retryable
                  failure (e.g. resource deleted externally). When it exceeds the configured
                  maximum, the TaskAction is converted to a permanent failure.
                format: int32
                type: integer
            type: object
