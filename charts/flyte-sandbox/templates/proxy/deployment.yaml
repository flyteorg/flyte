{{- if .Values.sandbox.proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flyte-sandbox.fullname" . }}-proxy
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "flyte-sandbox.proxySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "flyte-sandbox.proxySelectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-dns
          image: "rancher/mirrored-library-busybox:1.34.1"
          imagePullPolicy: Never
          command: ['sh', '-c', 'until nslookup kube-dns.kube-system.svc.cluster.local; do sleep 1; done']
      containers:
        - name: proxy
          {{- with .Values.sandbox.proxy.image }}
          image: {{ printf "%s:%s" .repository .tag | quote }}
          imagePullPolicy: {{ .pullPolicy | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 1
            periodSeconds: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "flyte-sandbox.proxyConfigMapName" . }}
{{- end }}
