{{- if or ( index .Values "flyte-binary" "enabled" ) .Values.sandbox.dev }}
{{- $backendService := "" }}
{{- if index .Values "flyte-binary" "enabled" }}
{{- $backendService = include "flyte-binary.service.http.name" . }}
{{- else }}
{{- $backendService = include "flyte-sandbox.localHeadlessService" . }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flyte-sandbox.fullname" . }}-api
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
spec:
  rules:
    - http:
        paths:
          {{- range $path := list "/healthz" "/readyz" }}
          - path: {{ $path }}
            pathType: Exact
            backend:
              service:
                name: {{ $backendService }}
                port:
                  number: 8090
          {{- end }}
          - path: /flyteidl2.
            pathType: Prefix
            backend:
              service:
                name: {{ $backendService }}
                port:
                  number: 8090
{{- end }}
---
{{- if .Values.sandbox.console.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flyte-sandbox.fullname" . }}-console
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
spec:
  rules:
    - http:
        paths:
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: {{ include "flyte-sandbox.fullname" . }}-console
                port:
                  number: 80
{{- end }}
---
{{- if .Values.minio.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flyte-sandbox.fullname" . }}-minio
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-strip-minio@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /minio
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-minio
                port:
                  number: 9001
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-minio
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /minio
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "flyte-sandbox.fullname" . }}-loading
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "flyte-sandbox.fullname" . }}-loading
                port:
                  number: 80
