{{- if .Values.sandbox.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flyte-sandbox.proxyConfigMapName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "flyte-sandbox.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
        access_log_path: /dev/stdout
    static_resources:
        listeners:
            - address:
                  socket_address:
                      address: 0.0.0.0
                      port_value: 8000
              filter_chains:
                  - filters:
                        - name: envoy.filters.network.http_connection_manager
                          typed_config:
                              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                              stat_prefix: ingress_http
                              codec_type: AUTO
                              upgrade_configs:
                                  - upgrade_type: websocket
                              route_config:
                                  name: local_route
                                  virtual_hosts:
                                      - name: backend
                                        domains:
                                            - "*"
                                        cors:
                                            allow_origin_string_match:
                                                - exact: "http://localhost:8080"
                                            allow_methods: "GET, POST, OPTIONS"
                                            allow_headers: "content-type, x-grpc-web, x-user-agent, grpc-timeout, authorization, connect-protocol-version, connect-timeout-ms"
                                            expose_headers: "grpc-status, grpc-message, grpc-status-details-bin"
                                            allow_credentials: true
                                        routes:
                                            {{- if or ( index .Values "flyte-binary" "enabled" ) .Values.sandbox.dev }}
                                            - match:
                                                  prefix: "/v2"
                                              route:
                                                  cluster: flyte
                                            - match:
                                                  prefix: "/healthz"
                                              route:
                                                  cluster: flyte
                                            - match:
                                                  prefix: "/readyz"
                                              route:
                                                  cluster: flyte
                                            - match:
                                                  prefix: "/flyteidl2.workflow.RunService"
                                              route:
                                                  cluster: flyte
                                                  timeout: 0s
                                            - match:
                                                  prefix: "/flyteidl2.task.TaskService"
                                              route:
                                                  cluster: flyte
                                                  timeout: 0s
                                            - match:
                                                  prefix: "/flyteidl2.workflow.TranslatorService"
                                              route:
                                                  cluster: flyte
                                                  timeout: 0s
                                            - match:
                                                  prefix: "/flyteidl2.actions.ActionsService"
                                              route:
                                                  cluster: flyte
                                                  timeout: 0s
                                            - match:
                                                  prefix: "/flyteidl2.dataproxy.DataProxyService"
                                              route:
                                                  cluster: flyte
                                                  timeout: 0s
                                            - match:
                                                  prefix: "/flyteidl2."
                                              route:
                                                  cluster: flyte
                                                  timeout: 0s
                                            {{- end }}
                                            {{- if index .Values "kubernetes-dashboard" "enabled" }}
                                            - match:
                                                  path: "/kubernetes-dashboard"
                                              redirect:
                                                  path_redirect: "/kubernetes-dashboard/"
                                            - match:
                                                  prefix: "/kubernetes-dashboard/"
                                              route:
                                                  cluster: kubernetes-dashboard
                                                  prefix_rewrite: /
                                            {{- end }}
                                            {{- if .Values.minio.enabled }}
                                            - match:
                                                  path: "/minio"
                                              redirect:
                                                  path_redirect: "/minio/"
                                            - match:
                                                  prefix: "/minio/"
                                              route:
                                                  cluster: minio
                                                  prefix_rewrite: /
                                            {{- end }}
                              http_filters:
                                  - name: envoy.filters.http.cors
                                    typed_config:
                                        "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                                  - name: envoy.filters.http.router
                                    typed_config:
                                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        clusters:
            {{- if or ( index .Values "flyte-binary" "enabled" ) .Values.sandbox.dev }}
            - name: flyte
              connect_timeout: 0.25s
              type: STRICT_DNS
              lb_policy: ROUND_ROBIN
              http2_protocol_options: {}
              load_assignment:
                  cluster_name: flyte
                  endpoints:
                      - lb_endpoints:
                            - endpoint:
                                  address:
                                      socket_address:
                                          {{- if index .Values "flyte-binary" "enabled" }}
                                          address: {{ include "flyte-binary.service.http.name" .}}
                                          {{- else }}
                                          address: {{ include "flyte-sandbox.localHeadlessService" . }}
                                          {{- end }}
                                          port_value: 8090
            {{- end }}
            {{- if index .Values "kubernetes-dashboard" "enabled" }}
            - name: kubernetes-dashboard
              connect_timeout: 0.25s
              type: STRICT_DNS
              lb_policy: ROUND_ROBIN
              load_assignment:
                  cluster_name: kubernetes-dashboard
                  endpoints:
                      - lb_endpoints:
                            - endpoint:
                                  address:
                                      socket_address:
                                          address: {{ .Release.Name }}-kubernetes-dashboard
                                          port_value: 80
            {{- end }}
            {{- if .Values.minio.enabled }}
            - name: minio
              connect_timeout: 0.25s
              type: STRICT_DNS
              lb_policy: ROUND_ROBIN
              load_assignment:
                  cluster_name: minio
                  endpoints:
                      - lb_endpoints:
                            - endpoint:
                                  address:
                                      socket_address:
                                          address: {{ .Release.Name }}-minio
                                          port_value: 9001
            {{- end }}

{{- end }}
