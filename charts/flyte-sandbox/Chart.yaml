apiVersion: v2
name: flyte-sandbox
description: A Helm chart for the Flyte sandbox cluster with Knative app support

type: application

version: 0.1.0

appVersion: "1.16.1"

dependencies:
  - name: docker-registry
    version: 2.2.2
    repository: https://twuni.github.io/docker-registry.helm
    condition: docker-registry.enabled
  - name: flyte-binary
    version: v0.2.0
    repository: file://../flyte-binary
    condition: flyte-binary.enabled
