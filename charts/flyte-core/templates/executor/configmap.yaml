{{- if .Values.executor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flyte-core.componentConfigMapName" (dict "ctx" $ "component" "executor") }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "flyte-core.componentLabels" (dict "ctx" $ "component" "executor") | nindent 4 }}
data:
  000-core.yaml: |
    logger:
      show-source: true
      level: {{ .Values.logging.level }}
  001-storage.yaml: |
    {{- include "flyte-core.storageConfig" . | nindent 4 }}
  010-executor.yaml: |
    executor:
      healthProbeBindAddress: ":{{ .Values.executor.healthProbePort }}"
      leaderElect: {{ .Values.executor.config.leaderElect }}
      eventsServiceUrl: "http://{{ include "flyte-core.componentFullname" (dict "ctx" $ "component" "events") }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.events.port }}"
      cacheServiceUrl: "http://{{ include "flyte-core.componentFullname" (dict "ctx" $ "component" "cache-service") }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.cacheService.port }}"
      gc:
        interval: {{ .Values.executor.config.gc.interval }}
        maxTTL: {{ .Values.executor.config.gc.maxTTL }}
    webhook:
      certDir: {{ .Values.webhook.certDir }}
      localCert: {{ .Values.webhook.localCert }}
      serviceName: {{ include "flyte-core.webhook.serviceName" . }}
      servicePort: {{ .Values.webhook.servicePort }}
  {{- with .Values.inlineConfig }}
  100-inline.yaml: |
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
