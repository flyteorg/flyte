{{- if .Values.cacheService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flyte-core.componentFullname" (dict "ctx" $ "component" "cache-service") }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "flyte-core.componentLabels" (dict "ctx" $ "component" "cache-service") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.cacheService.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "flyte-core.selectorLabels" (dict "ctx" $ "component" "cache-service") | nindent 4 }}
{{- end }}
