# Unified Flyte Manager Configuration

manager:
  # Single server port for all Connect services (Runs, State, Queue, DataProxy)
  server:
    host: "0.0.0.0"
    port: 8090

  executor:
    healthProbePort: 8081

  kubernetes:
    namespace: "flyte"
    kubeconfig: "~/.kube/config"

apps:
  cacheTtl: 30s

internalApps:
  enabled: true
  baseDomain: "localhost"
  scheme: "http"
  ingressAppsPort: 30081
  defaultRequestTimeout: 300s
  maxRequestTimeout: 3600s
  defaultEnvVars:
    - FLYTE_AWS_ENDPOINT: "http://rustfs.flyte.svc.cluster.local:9000"
    - FLYTE_AWS_ACCESS_KEY_ID: "rustfs"
    - FLYTE_AWS_SECRET_ACCESS_KEY: "rustfsstorage"
    - _U_EP_OVERRIDE: "host.docker.internal:8090"
    - _U_INSECURE: "true"
    - _U_USE_ACTIONS: "1"


# Webhook configuration
# localCert: true writes the generated TLS cert to disk so the webhook server can read it.
webhook:
  localCert: true
  certDir: /tmp/flyte/webhook/certs
  serviceName: flyte-devbox-local
  servicePort: 9443
  # Use the Embedded injector with a K8s backend so the webhook reads the
  # secret value at admission time from the k8s Secret written by SecretService
  # (matching EncodeSecretName(org, domain, project, name)) and inlines the
  # value into the pod spec.
  secretManagerTypes:
    - Embedded
  embeddedSecretManagerConfig:
    type: K8s
    k8sConfig:
      # Must match manager.kubernetes.namespace above — the namespace where
      # SecretService writes secrets.
      namespace: flyte

# Executor configuration
executor:
  gc:
    interval: 1h
    maxTTL: 24h

# Runs service configuration
runs:
  storagePrefix: "s3://flyte-data"
  database:
    postgres:
      host: "localhost"
      port: 30001
      dbName: "runs"
      username: "postgres"
      password: "postgres"
      options: "sslmode=disable"

# Logger configuration
logger:
  level: 5  # Info level
  show-source: true

# Data Proxy Configuration
dataproxy:
  upload:
    maxSize: "100Mi"
    maxExpiresIn: 1h
    defaultFileNameLength: 20
    storagePrefix: "uploads"
  download:
    maxExpiresIn: 1h

# Default env vars injected into task pods by the executor.
# flyte-host is injected into the kind node's /etc/hosts by `make cluster-create`,
# pointing to the host machine's gateway IP so pods can reach host services.
plugins:
  k8s:
    default-env-vars:
      - FLYTE_AWS_ENDPOINT: "http://rustfs.flyte.svc.cluster.local:9000"
      - FLYTE_AWS_ACCESS_KEY_ID: "rustfs"
      - FLYTE_AWS_SECRET_ACCESS_KEY: "rustfsstorage"
      - _U_EP_OVERRIDE: "host.docker.internal:8090"
      - _U_INSECURE: "true"
      - _U_USE_ACTIONS: "1"

# Storage Configuration
# For local development, using RustFS (run: bash ./scripts/start-rustfs.sh)
# You can also use "mem" type for in-memory storage during testing
storage:
  type: minio
  container: "flyte-data"
  enable-multicontainer: false
  stow:
    kind: "s3"
    config:
      auth_type: "accesskey"
      access_key_id: "rustfs"
      secret_key: "rustfsstorage"
      region: "us-east-1"
      endpoint: "http://localhost:30002"
      disable_ssl: "true"
