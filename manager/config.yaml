# Unified Flyte Manager Configuration

manager:
  # Single server port for all Connect services (Runs, State, Queue, DataProxy)
  server:
    host: "0.0.0.0"
    port: 8090

  executor:
    healthProbePort: 8081

  kubernetes:
    namespace: "flyte"
    # Optional: specify custom kubeconfig path
    # kubeconfig: "/path/to/kubeconfig"

# Runs service configuration
runs:
  storagePrefix: "s3://flyte-data"

# Database configuration (SQLite)
database:
  type: "sqlite"
  sqlite:
    file: "flyte.db"

# Logger configuration
logger:
  level: 4  # Info level
  show-source: true

# Data Proxy Configuration
dataproxy:
  upload:
    maxSize: "100Mi"
    maxExpiresIn: 1h
    defaultFileNameLength: 20
    storagePrefix: "uploads"
  download:
    maxExpiresIn: 1h

# Default env vars injected into task pods by the executor.
# flyte-host is injected into the kind node's /etc/hosts by `make cluster-create`,
# pointing to the host machine's gateway IP so pods can reach host services.
plugins:
  k8s:
    default-env-vars:
      - FLYTE_AWS_ENDPOINT: "http://flyte-host:9000"
      - FLYTE_AWS_ACCESS_KEY_ID: "minioadmin"
      - FLYTE_AWS_SECRET_ACCESS_KEY: "minioadmin"
      - _U_EP_OVERRIDE: "flyte-host:8090"
      - _U_INSECURE: "true"

# Storage Configuration
# For local development, using RustFS (run: bash start-rustfs.sh)
# You can also use "mem" type for in-memory storage during testing
storage:
  type: minio
  container: "flyte-data"
  enable-multicontainer: false
  stow:
    kind: "s3"
    config:
      auth_type: "accesskey"
      access_key_id: "minioadmin"
      secret_key: "minioadmin"
      region: "us-east-1"
      endpoint: "http://localhost:9000"
      disable_ssl: "true"
