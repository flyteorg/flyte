version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - depguard
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    depguard:
      rules:
        no-h2c:
          deny:
            - pkg: golang.org/x/net/http2/h2c
              desc: "deprecated: use net/http with http.Protocols.SetUnencryptedHTTP2(true)"
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
