helmGlobals:
  chartHome: ../../../../charts
helmCharts:
- name: flyte-sandbox
  releaseName: flyte-sandbox
  namespace: flyte
  valuesInline:
    # Disabled: PostgreSQL runs as an embedded process on the host via
    # the fergusstrange/embedded-postgres library instead of a pod.
    postgresql:
      enabled: false
    flyte-binary:
      deployment:
        waitForDB:
          image:
            repository: rancher/mirrored-library-busybox
            tag: "1.34.1"
          command:
            - sh
            - -ec
          args:
            - |
              until nc -z flyte-sandbox-postgresql.flyte 5432; do
                echo waiting for database
                sleep 0.5
              done
namespace: flyte
resources:
- ../namespace.yaml
- ../dashboard-rbac.yaml
- ../embedded-postgres-service.yaml
patches:
- target:
    kind: Secret
    name: kubernetes-dashboard-csrf
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: Deployment
    name: flyte-sandbox-kubernetes-dashboard
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: Service
    name: flyte-sandbox-kubernetes-dashboard
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: ServiceAccount
    name: flyte-sandbox-kubernetes-dashboard
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: Secret
    name: flyte-sandbox-kubernetes-dashboard-certs
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: Secret
    name: kubernetes-dashboard-key-holder
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: ConfigMap
    name: kubernetes-dashboard-settings
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: Role
    name: flyte-sandbox-kubernetes-dashboard
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- target:
    kind: RoleBinding
    name: flyte-sandbox-kubernetes-dashboard
  patch: |
    - op: add
      path: /metadata/namespace
      value: flyte
- path: ../minio-patch.yaml
