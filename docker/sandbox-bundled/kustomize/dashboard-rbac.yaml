apiVersion: v1
kind: Secret
metadata:
  name: kubernetes-dashboard-csrf
  namespace: flyte
---
apiVersion: v1
kind: Service
metadata:
  name: flyte-sandbox-kubernetes-dashboard
  namespace: flyte
spec:
  type: ExternalName
  externalName: flyte-sandbox-kubernetes-dashboard.default.svc.cluster.local
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubernetes-dashboard
  namespace: flyte
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["kubernetes-dashboard-csrf", "kubernetes-dashboard-key-holder"]
  verbs: ["get", "update", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["kubernetes-dashboard-settings"]
  verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubernetes-dashboard
  namespace: flyte
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubernetes-dashboard
subjects:
- kind: ServiceAccount
  name: flyte-sandbox-kubernetes-dashboard
  namespace: default
