# Source: flyte-sandbox/charts/flyte-binary/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: flyte-flyte-sandbox-config
  namespace: "flyte"
  labels:
    helm.sh/chart: flyte-binary-v0.2.0
    app.kubernetes.io/name: flyte-sandbox
    app.kubernetes.io/instance: flyte
    app.kubernetes.io/managed-by: Helm
  annotations:
data:
  000-core.yaml: |
    logger:
      show-source: true
      level: 5
    webhook:
      certDir: /var/run/flyte/certs
      localCert: true
      secretName: flyte-flyte-sandbox-webhook-secret
      serviceName: flyte-flyte-sandbox-webhook
      servicePort: 443

    actions:
      kubernetes:
        kubeconfig: ""
        namespace: flyte
      watchBufferSize: 100
    dataproxy:
      download:
        maxExpiresIn: 1h
      upload:
        defaultFileNameLength: 20
        maxExpiresIn: 1h
        maxSize: 100Mi
        storagePrefix: uploads
    manager:
      executor:
        healthProbePort: 8081
      kubernetes:
        burst: 2000
        kubeconfig: ""
        namespace: flyte
        qps: 1000
        timeout: 30s
      server:
        host: 0.0.0.0
        port: 8090
    runs:
      database:
        connMaxLifeTime: 1h
        maxIdleConnections: 10
        maxOpenConnections: 100
        postgres:
          dbname: flyte
          debug: false
          host: 127.0.0.1
          options: sslmode=disable
          password: ""
          port: 5432
          username: postgres
      server:
        host: 0.0.0.0
        port: 8090
      storagePrefix: s3://flyte-data
      watchBufferSize: 100
    secret:
      kubernetes:
        burst: 200
        clusterName: flyte-sandbox
        kubeconfig: ""
        namespace: flyte
        qps: 100
        timeout: 30s
  001-plugins.yaml: |
    tasks:
      task-plugins:
        default-for-task-types:
          container: container
          container_array: k8s-array
          sidecar: sidecar
        enabled-plugins:
        - container
        - sidecar
        - connector-service
        - echo
    plugins:
      logs:
        kubernetes-enabled: true
        kubernetes-template-uri: http://localhost:30080/kubernetes-dashboard/#/log/{{.namespace }}/{{ .podName }}/pod?namespace={{ .namespace }}
        cloudwatch-enabled: false
        stackdriver-enabled: false
      k8s:
        co-pilot:
          image: "cr.flyte.org/flyteorg/flytecopilot:v1.16.4"
      k8s-array:
        logs:
          config:
            kubernetes-enabled: true
            kubernetes-template-uri: http://localhost:30080/kubernetes-dashboard/#/log/{{.namespace }}/{{ .podName }}/pod?namespace={{ .namespace }}
            cloudwatch-enabled: false
            stackdriver-enabled: false
  002-database.yaml: |
    database:
      sqlite:
        file: "/var/lib/flyte/flyte.db"
  003-storage.yaml: |
    storage:
      type: stow
      stow:
        kind: s3
        config:
          region: us-east-1
          disable_ssl: true
          v2_signing: true
          endpoint: http://flyte-minio.flyte:9000
          auth_type: accesskey
      container: flyte-data
  100-inline-config.yaml: |
    plugins:
      k8s:
        default-env-vars:
        - FLYTE_AWS_ENDPOINT: http://flyte-minio.flyte:9000
        - FLYTE_AWS_ACCESS_KEY_ID: minio
        - FLYTE_AWS_SECRET_ACCESS_KEY: miniostorage
        - _U_EP_OVERRIDE: 'flyte-http.flyte:8090'
        - _U_INSECURE: "true"
        - _U_USE_ACTIONS: "1"
    runs:
      database:
        postgres:
          dbName: runs
          host: 'flyte-postgresql.flyte'
          password: postgres
          port: 5432
          user: postgres
    storage:
      signedURL:
        stowConfigOverride:
          endpoint: http://localhost:30002
    task_resources:
      defaults:
        cpu: 500m
        ephemeralStorage: 0
        gpu: 0
        memory: 1Gi
      limits:
        cpu: 0
        ephemeralStorage: 0
        gpu: 0
        memory: 0
