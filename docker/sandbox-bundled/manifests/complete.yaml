  labels:
    helm.sh/chart: flyte-binary-v0.2.0
    app.kubernetes.io/name: flyte-sandbox
    app.kubernetes.io/instance: flyte
    app.kubernetes.io/managed-by: Helm
  annotations:
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flyte-sandbox
      app.kubernetes.io/instance: flyte
      app.kubernetes.io/component: flyte-binary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flyte-sandbox
        app.kubernetes.io/instance: flyte
        app.kubernetes.io/component: flyte-binary
      annotations:
        checksum/configuration: 22d8e67e59af23aa3c43a4306df0e08551860ce11b6071a0ffa2479b3417ff35
        checksum/configuration-secret: 1244096c96a3669e35a7b826ff095beae0d3debd4c48d86843cebb0376b00c27
    spec:
      serviceAccountName: flyte-flyte-sandbox
      initContainers:
        - name: wait-for-db
          image: "bitnami/postgresql:sandbox"
          imagePullPolicy: "Never"
          command:
            - sh
            - -ec
          args:
            - |
              until pg_isready \
                -h flyte-postgresql \
                -p 5432 \
                -U postgres
              do
                echo waiting for database
                sleep 0.1
              done
      containers:
        - name: flyte
          image: "flyte-binary-v2:sandbox"
          imagePullPolicy: "Never"
          args:
            - --config
            - /etc/flyte/config.d/*.yaml
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http
              containerPort: 8090
            - name: webhook
              containerPort: 9443
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/flyte/config.d
            - name: webhook-certs
              mountPath: /var/run/flyte/certs
              readOnly: false
      volumes:
        - name: config
          projected:
            sources:
            - configMap:
                name: flyte-flyte-sandbox-config
            - secret:
                name: flyte-flyte-sandbox-config-secret
            - configMap:
                name: flyte-extra-config
        - name: webhook-certs
          emptyDir: {}
