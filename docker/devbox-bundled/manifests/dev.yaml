    kind: Certificate
    plural: certificates
    shortNames:
    - kcert
    singular: certificate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Certificate is responsible for provisioning a SSL certificate for the
          given hosts. It is a Knative abstraction for various SSL certificate
          provisioning solutions (such as cert-manager or self-signed SSL certificate).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Spec is the desired state of the Certificate.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status
            properties:
              dnsNames:
                description: |-
                  DNSNames is a list of DNS names the Certificate could support.
                  The wildcard format of DNSNames (e.g. *.default.example.com) is supported.
                items:
                  type: string
                type: array
              domain:
                description: Domain is the top level domain of the values for DNSNames.
                type: string
              secretName:
                description: SecretName is the name of the secret resource to store
                  the SSL certificate in.
                type: string
            required:
            - dnsNames
            - secretName
            type: object
          status:
            description: |-
              Status is the current state of the Certificate.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#spec-and-status
            properties:
              annotations:
                additionalProperties:
                  type: string
                description: |-
                  Annotations is additional Status fields for the Resource to save some
                  additional State as well as convey more information to the user. This is
                  roughly akin to Annotations on any k8s resource, just the reconciler conveying
                  richer information outwards.
                type: object
              conditions:
                description: Conditions the latest available observations of a resource's
                  current state.
                items:
                  description: |-
                    Condition defines a readiness condition for a Knative resource.
                    See: https://github.com/kubernetes/community/blob/master/contributors/devel/sig-architecture/api-conventions.md#typical-status-properties
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time the condition transitioned from one status to another.
                        We use VolatileTime in place of metav1.Time to exclude this from creating equality.Semantic
                        differences (all other things held constant).
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    severity:
                      description: |-
                        Severity with which to treat failures of this type of condition.
                        When this is not specified, it defaults to Error.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              http01Challenges:
                description: |-
                  HTTP01Challenges is a list of HTTP01 challenges that need to be fulfilled
                  in order to get the TLS certificate..
                items:
                  description: |-
                    HTTP01Challenge defines the status of a HTTP01 challenge that a certificate needs
                    to fulfill.
                  properties:
                    serviceName:
                      description: ServiceName is the name of the service to serve
                        HTTP01 challenge requests.
                      type: string
                    serviceNamespace:
                      description: ServiceNamespace is the namespace of the service
                        to serve HTTP01 challenge requests.
                      type: string
                    servicePort:
                      anyOf:
                      - type: integer
                      - type: string
                      description: ServicePort is the port of the service to serve
                        HTTP01 challenge requests.
                      x-kubernetes-int-or-string: true
                    url:
                      description: URL is the URL that the HTTP01 challenge is expected
                        to serve on.
                      type: string
                  type: object
                type: array
              notAfter:
                description: |-
                  The expiration time of the TLS certificate stored in the secret named
                  by this resource in spec.secretName.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the 'Generation' of the Service that
                  was last processed by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
