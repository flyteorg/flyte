apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: flyte-devbox
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: flyte-devbox
    app.kubernetes.io/version: 1.16.1
    helm.sh/chart: flyte-devbox-0.1.0
  name: rustfs
  namespace: flyte
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: flyte-devbox
      app.kubernetes.io/name: rustfs
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: flyte-devbox
        app.kubernetes.io/name: rustfs
    spec:
      containers:
      - env:
        - name: RUSTFS_ADDRESS
          value: 0.0.0.0:9000
        - name: RUSTFS_VOLUMES
          value: /data
        - name: RUSTFS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: access-key
              name: rustfs
        - name: RUSTFS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: secret-key
              name: rustfs
        image: rustfs/rustfs:sandbox
        imagePullPolicy: Never
        livenessProbe:
          failureThreshold: 5
          initialDelaySeconds: 10
          periodSeconds: 10
          tcpSocket:
            port: rustfs-api
        name: rustfs
        ports:
        - containerPort: 9000
          name: rustfs-api
          protocol: TCP
        readinessProbe:
          failureThreshold: 5
          initialDelaySeconds: 5
          periodSeconds: 5
          tcpSocket:
            port: rustfs-api
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
        volumeMounts:
        - mountPath: /data
          name: data
      initContainers:
      - command:
        - /bin/sh
        - -ec
        - |
          chown -R 10001:10001 /data
          mkdir -p /data/flyte-data
          chown 10001:10001 /data/flyte-data
        image: busybox:latest
        imagePullPolicy: IfNotPresent
        name: volume-permissions
        securityContext:
          runAsUser: 0
        volumeMounts:
        - mountPath: /data
          name: data
      securityContext:
        fsGroup: 10001
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: flyte-devbox-rustfs-storage
