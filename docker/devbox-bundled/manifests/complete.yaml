apiVersion: v1
data:
  000-core.yaml: |
    logger:
      show-source: true
      level: 5
    webhook:
      certDir: /var/run/flyte/certs
      localCert: true
      secretName: flyte-binary-webhook-secret
      serviceName: flyte-binary-webhook
      servicePort: 443

    actions:
      kubernetes:
        kubeconfig: ""
        namespace: flyte
      watchBufferSize: 100
    dataproxy:
      download:
        maxExpiresIn: 1h
      upload:
        defaultFileNameLength: 20
        maxExpiresIn: 1h
        maxSize: 100Mi
        storagePrefix: uploads
    manager:
      executor:
        healthProbePort: 8081
      kubernetes:
        burst: 2000
        kubeconfig: ""
        namespace: flyte
        qps: 1000
        timeout: 30s
      server:
        host: 0.0.0.0
        port: 8090
    runs:
      database:
        connMaxLifeTime: 1h
        maxIdleConnections: 10
        maxOpenConnections: 100
        postgres:
          dbname: flyte
          debug: false
          host: 127.0.0.1
          options: sslmode=disable
          password: ""
          port: 5432
          username: postgres
      server:
        host: 0.0.0.0
        port: 8090
      storagePrefix: s3://flyte-data
      watchBufferSize: 100
    secret:
      kubernetes:
        burst: 200
        clusterName: flyte-devbox
        kubeconfig: ""
        namespace: flyte
        qps: 100
        timeout: 30s
  001-plugins.yaml: |
    tasks:
      task-plugins:
        default-for-task-types:
          container: container
          container_array: k8s-array
          sidecar: sidecar
        enabled-plugins:
        - container
        - sidecar
        - connector-service
        - echo
    plugins:
      logs:
        kubernetes-enabled: false
        cloudwatch-enabled: false
        stackdriver-enabled: false
      k8s:
        co-pilot:
          image: "cr.flyte.org/flyteorg/flytecopilot:v1.16.4"
      k8s-array:
        logs:
          config:
            kubernetes-enabled: false
            cloudwatch-enabled: false
            stackdriver-enabled: false
  002-database.yaml: |
    database:
      postgres:
        username: postgres
        host: postgresql
        port: 5432
        dbname: flyte
        options: "sslmode=disable"
  003-storage.yaml: |
    storage:
      type: stow
      stow:
        kind: s3
        config:
          region: us-east-1
          disable_ssl: true
          v2_signing: true
          endpoint: http://rustfs.flyte:9000
          auth_type: accesskey
      container: flyte-data
  100-inline-config.yaml: |
    manager:
      internalApps:
        baseDomain: localhost
        defaultEnvVars:
        - FLYTE_AWS_ENDPOINT: http://rustfs.flyte:9000
        - FLYTE_AWS_ACCESS_KEY_ID: rustfs
        - FLYTE_AWS_SECRET_ACCESS_KEY: rustfsstorage
        - _U_EP_OVERRIDE: flyte-binary-http.flyte:8090
        - _U_INSECURE: "true"
        - _U_USE_ACTIONS: "1"
        enabled: true
        scheme: http
    plugins:
      k8s:
        default-env-vars:
        - FLYTE_AWS_ENDPOINT: http://rustfs.flyte:9000
        - FLYTE_AWS_ACCESS_KEY_ID: rustfs
        - FLYTE_AWS_SECRET_ACCESS_KEY: rustfsstorage
        - _U_EP_OVERRIDE: flyte-binary-http.flyte:8090
        - _U_INSECURE: "true"
        - _U_USE_ACTIONS: "1"
    runs:
      database:
        postgres:
          dbName: runs
          host: postgresql.flyte
          password: postgres
          port: 5432
          user: postgres
    storage:
      signedURL:
        stowConfigOverride:
          endpoint: http://localhost:30002
    task_resources:
      defaults:
        cpu: 500m
        ephemeralStorage: 0
        gpu: 0
        memory: 1Gi
      limits:
        cpu: 0
        ephemeralStorage: 0
        gpu: 0
        memory: 0
