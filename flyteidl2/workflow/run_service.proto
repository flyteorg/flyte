syntax = "proto3";

package flyteidl2.workflow;

import "buf/validate/validate.proto";
import "flyteidl2/common/identifier.proto";
import "flyteidl2/common/list.proto";
import "flyteidl2/common/phase.proto";
import "flyteidl2/common/run.proto";
import "flyteidl2/core/execution.proto";
import "flyteidl2/task/common.proto";
import "flyteidl2/task/run.proto";
import "flyteidl2/task/task_definition.proto";
import "flyteidl2/workflow/run_definition.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/flyteorg/flyte/v2/gen/go/flyteidl2/workflow";

// RunService provides an interface for managing runs.
service RunService {
  // Create a new run of the given task.
  rpc CreateRun(CreateRunRequest) returns (CreateRunResponse) {}

  // Abort a run.
  rpc AbortRun(AbortRunRequest) returns (AbortRunResponse) {}

  // Get detailed information about a run.
  rpc GetRunDetails(GetRunDetailsRequest) returns (GetRunDetailsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Stream detailed information updates about a run. The call will terminate when the run reaches a terminal phase.
  rpc WatchRunDetails(WatchRunDetailsRequest) returns (stream WatchRunDetailsResponse) {}

  // Get detailed information about an action.
  rpc GetActionDetails(GetActionDetailsRequest) returns (GetActionDetailsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Stream detailed information updates about an action. The call will terminate when the action reaches a terminal phase.
  rpc WatchActionDetails(WatchActionDetailsRequest) returns (stream WatchActionDetailsResponse) {}

  // Deprecated: Use DataProxyService.GetActionData instead.
  rpc GetActionData(GetActionDataRequest) returns (GetActionDataResponse) {
    option deprecated = true;
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // List runs based on the provided filter criteria.
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Stream updates for runs based on the provided filter criteria. Responses may include newly discovered
  // runs or updates to existing ones from the point of invocation.
  rpc WatchRuns(WatchRunsRequest) returns (stream WatchRunsResponse) {}

  // List all actions for a given run.
  rpc ListActions(ListActionsRequest) returns (ListActionsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Stream updates for actions given a run. Responses may include newly discovered nested runs or updates
  // to  existing ones from the point of invocation.
  rpc WatchActions(WatchActionsRequest) returns (stream WatchActionsResponse) {}

  // Stream of k8s cluster events in human readable form
  rpc WatchClusterEvents(WatchClusterEventsRequest) returns (stream WatchClusterEventsResponse) {}

  // AbortAction aborts a single action that was previously created or is currently being processed by a worker.
  rpc AbortAction(AbortActionRequest) returns (AbortActionResponse) {}

  // SignalEvent resolves a paused condition action by supplying its value.
  // It converts the user-facing EventPayload to a core.Literal and delegates
  // to ActionsService.Signal, resolving the condition's parent action for
  // routing.
  rpc SignalEvent(SignalEventRequest) returns (SignalEventResponse) {}

  // Stream updates for task groups based on the provided filter criteria.
  rpc WatchGroups(WatchGroupsRequest) returns (stream WatchGroupsResponse) {}

  // Get the storage URIs for an action's input and output data.
  rpc GetActionDataURIs(GetActionDataURIsRequest) returns (GetActionDataURIsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // Get the logging context (pod name, namespace, cluster) for an action attempt.
  rpc GetActionLogContext(GetActionLogContextRequest) returns (GetActionLogContextResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// Request message for creating a run.
message CreateRunRequest {
  oneof id {
    option (buf.validate.oneof).required = true;

    // The user provided run id.
    common.RunIdentifier run_id = 1;

    // The project id for this run. Run name will be generated.
    common.ProjectIdentifier project_id = 6;
  }

  // The task to run.
  oneof task {
    option (buf.validate.oneof).required = true;

    // The task id to use.
    task.TaskIdentifier task_id = 2;

    // The task spec to use.
    task.TaskSpec task_spec = 3;

    // The trigger name to use.
    common.TriggerName trigger_name = 7;
  }

  // Inputs to use.
  oneof input_wrapper {
    task.Inputs inputs = 4;

    common.OffloadedInputData offloaded_input_data = 9;
  }

  // The run spec to use.
  task.RunSpec run_spec = 5;

  // Indicates client that created this run.
  RunSource source = 8;

  // Optional explicit run start time. The scheduler sets this to a trigger's scheduled fire time
  // so it surfaces as flyte.ctx().run_start_time in the task. If unset, the server defaults it to
  // the current time. Copied onto RunSpec.run_start_time before the action is enqueued.
  google.protobuf.Timestamp run_start_time = 10;

  // Next field number: 11
}

// Response message for creating a run.
message CreateRunResponse {
  Run run = 1;
}

// Request message for aborting a run.
message AbortRunRequest {
  // Run to abort.
  common.RunIdentifier run_id = 1 [(buf.validate.field).required = true];

  // Reason for aborting the run. if applicable.
  optional string reason = 2;
}

// Response message for aborting a run.
message AbortRunResponse {}

// Request message for getting detailed information about a run.
message GetRunDetailsRequest {
  // Run to query.
  common.RunIdentifier run_id = 1 [(buf.validate.field).required = true];
}

// Response message for getting detailed information about a run.
message GetRunDetailsResponse {
  // Detailed information about the run.
  RunDetails details = 1;
}

// Request message for watching detailed information about a run.
message WatchRunDetailsRequest {
  // Run to query.
  common.RunIdentifier run_id = 1 [(buf.validate.field).required = true];
}

// Response message for watching detailed information about a run.
message WatchRunDetailsResponse {
  // Detailed information about the run.
  RunDetails details = 1;
}

// Request message for getting detailed information about an action.
message GetActionDetailsRequest {
  // Action to query.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];
}

// Response message for getting detailed information about an action.
message GetActionDetailsResponse {
  // Detailed information about the action.
  ActionDetails details = 1;
}

// Request message for watching detailed information about an action.
message WatchActionDetailsRequest {
  // Action to query.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];
}

// Response message for watching detailed information about an action.
message WatchActionDetailsResponse {
  // Detailed information about the action.
  ActionDetails details = 1;
}

// Request message for querying action data.
message GetActionDataRequest {
  // Action to query.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];
}

// Response message for querying action data.
message GetActionDataResponse {
  // Inputs for the action.
  task.Inputs inputs = 1;

  // Outputs for the action.
  task.Outputs outputs = 2;
}

// Request message for getting action data URIs.
message GetActionDataURIsRequest {
  // Action to query.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];
}

// Response message for getting action data URIs.
message GetActionDataURIsResponse {
  // URI for the action's input data.
  string inputs_uri = 1;

  // URI for the action's output data. Empty if action hasn't succeeded or has no outputs.
  string outputs_uri = 2;
}

// Request message for getting action log context.
message GetActionLogContextRequest {
  // Action to query.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];

  // The attempt number.
  uint32 attempt = 2 [(buf.validate.field).uint32.gt = 0];
}

// Response message for getting action log context.
message GetActionLogContextResponse {
  // The logging context for the action attempt.
  flyteidl2.core.LogContext log_context = 1;

  // The cluster where the action attempt is running.
  string cluster = 2;

  // The start time of the action attempt.
  google.protobuf.Timestamp start_time = 3;

  // The end time of the action attempt. Unset if the attempt is still running.
  google.protobuf.Timestamp end_time = 4;
}

// Request message for listing runs.
message ListRunsRequest {
  reserved 3, 5; // Deprecated

  // Common list request parameters.
  common.ListRequest request = 1;

  oneof scope_by {
    option (buf.validate.oneof).required = true;

    // Organization name for filtering runs.
    string org = 2 [(buf.validate.field).string.min_len = 1];

    // Project identifier for filtering runs.
    common.ProjectIdentifier project_id = 4;

    // List runs created from a trigger.
    common.TriggerName trigger_name = 6;

    // Task name for filtering runs
    task.TaskName task_name = 7;

    // Task identifier for filtering runs
    task.TaskIdentifier task_id = 8;
  }

  // When true, only return runs that contain at least one action in the
  // PAUSED phase (e.g. a human-in-the-loop gate node awaiting input).
  bool paused_actions_only = 9;
}

// Response message for listing runs.
message ListRunsResponse {
  // List of runs matching the filter criteria.
  repeated Run runs = 1;

  // Token for fetching the next page of results, if any.
  string token = 2;
}

// Request message for watching runs.
message WatchRunsRequest {
  oneof target {
    option (buf.validate.oneof).required = true;

    // Organization name for filtering runs.
    string org = 2 [(buf.validate.field).string.min_len = 1];
    // Cluster identifier for filtering runs.
    common.ClusterIdentifier cluster_id = 3;
    // Project identifier for filtering runs.
    common.ProjectIdentifier project_id = 4;
    // Task identifier for filtering runs.
    task.TaskIdentifier task_id = 5;
  }
}

// Response message for watching runs.
message WatchRunsResponse {
  // New or updated runs matching the filter criteria.
  repeated Run runs = 1;
}

// Request message for listing actions.
message ListActionsRequest {
  // Common list request parameters.
  common.ListRequest request = 1;

  // Run identifier for filtering actions.
  common.RunIdentifier run_id = 2 [(buf.validate.field).required = true];
}

// Response message for listing actions.
message ListActionsResponse {
  // List of actions matching the filter criteria.
  repeated Action actions = 1;

  // Token for fetching the next page of results, if any.
  string token = 2;

  // Note: This response does not include the enriched actions.
  // The enriched actions are only available in the WatchActionsResponse.
}

// Request message for watching actions.
message WatchActionsRequest {
  // Run identifier for filtering actions.
  common.RunIdentifier run_id = 1 [(buf.validate.field).required = true];

  // Optional filter(s) criteria for actions.
  // Valid filter fields include:
  // - NAME (must use function CONTAINS_CASE_INSENSITIVE): the value is whatever string to match to. This will cast all strings to lowercase and match.
  // - PHASE (must use function VALUE_IN): the value is the stringified integer of the enum of the phase and you can pass multiple phases (i.e. ["1", "4"])
  repeated common.Filter filter = 2;

  // Enable the new runStore we implemented for the WatchActions API
  // TODO(alex): We can remove this once the new runStore is properly tested and stable
  bool enable_run_store = 3;
}

// Response message for watching actions, comes with enriched action metadata.
message WatchActionsResponse {
  // New or updated actions matching the filter criteria. Enriched with children status counts
  repeated EnrichedAction enriched_actions = 1;
}

// WatchWindowedActionsRequest is the client → server message on the
// bidi stream. The first message must be Subscribe; subsequent
// messages must be UpdateWindow.
message WatchWindowedActionsRequest {
  oneof msg {
    Subscribe subscribe = 1;
    UpdateWindow update_window = 2;
  }

  // Subscribe opens the subscription. Sent exactly once as the first
  // message on the stream.
  message Subscribe {
    common.RunIdentifier run_id = 1 [(buf.validate.field).required = true];

    // Action name or group key currently focused in the UI; the
    // server centers the window on this item.
    string selected_item_id = 2;

    // Extra items to materialize above/below the selected item. Server
    // clamps; 0 means "use server default".
    int32 overscan_before = 3 [(buf.validate.field).int32.gte = 0];
    int32 overscan_after = 4 [(buf.validate.field).int32.gte = 0];

    // Items the client wants expanded. Key = action name OR group key.
    map<string, NodeExpansionParams> expanded_nodes = 5;

    // Optional filters; same semantics as legacy WatchActions filters.
    repeated common.ActionPhase phase_filter = 6;
    string name_filter = 7;
  }

  // UpdateWindow updates one or more window parameters. Sent as the
  // user scrolls, expands/collapses, or changes filters.
  message UpdateWindow {
    // Window anchor: either an item id (semantic selection / deep link) or an
    // absolute flat index (scroll-driven viewport). Exactly one must be set.
    oneof window_anchor {
      option (buf.validate.oneof).required = true;
      string selected_item_id = 1;
      uint64 anchor_flat_index = 7;
    }
    int32 overscan_before = 2 [(buf.validate.field).int32.gte = 0];
    int32 overscan_after = 3 [(buf.validate.field).int32.gte = 0];
    map<string, NodeExpansionParams> expanded_nodes = 4;
    repeated common.ActionPhase phase_filter = 5;
    string name_filter = 6;
  }
}

// NodeExpansionParams bounds how many children the server should
// materialize under an expanded node or group. limit <= 0 → server
// default; server also clamps to a hard cap.
message NodeExpansionParams {
  int32 offset = 1 [(buf.validate.field).int32.gte = 0];
  int32 limit = 2 [(buf.validate.field).int32.gte = 0];
}

// WatchWindowedActionsResponse is one server → client tick.
message WatchWindowedActionsResponse {
  // Window slice in flat_index order — only the items the client
  // can render right now (selected ± overscan).
  repeated WindowedItem window_items = 1;

  // Root → selected_item's parent. Sent on every response for
  // breadcrumb rendering; bounded by tree depth.
  repeated WindowedItem ancestors = 2;

  // Length of the full expanded flat list (not just the window).
  int64 total_flat_count = 3;

  // Position of selected_item_id within the flat list.
  int64 selected_flat_index = 4;

  // True on any full-window snapshot the client should replace its
  // window with — the initial attach snapshot, every mid-hydration
  // resnapshot, and the final completion snapshot. Distinct from a
  // delta (which carries only changed items). Use hydration_complete,
  // not this, to know when the initial load is actually done.
  bool initial_snapshot_complete = 5;

  // Sticky truncation notices — present on every response until the
  // server confirms client receipt.
  repeated TruncationNotice truncations = 6;

  // True when the server had to drop a tick due to backpressure; the
  // client should re-send its UpdateWindow to force a fresh snapshot.
  bool resync_hint = 7;

  // True once the run's initial DB hydration has finished (the store
  // left the HYDRATING state). Mid-hydration resnapshots carry false;
  // the completion snapshot and all post-ready responses carry true.
  // This is the real "first paint / loading done" signal.
  bool hydration_complete = 8;
}

// WindowedItem is one slot in the windowed flat list — either a
// regular action or a synthetic group folder.
message WindowedItem {
  oneof item {
    EnrichedAction action = 1;
    GroupNode group = 2;
  }
  int32 depth = 3;
  bool is_expanded = 4;
}

// ActionLeaf is one entry in a GroupAggregations top-3 list.
message ActionLeaf {
  // Member action name; resolves to a node under the group's parent.
  string action_id = 1;
  // Interned short name from the member's task spec.
  string short_name = 2;
  // Metric for this entry — wall-clock duration, running duration, or
  // setup time depending on which list the leaf appears in.
  google.protobuf.Duration duration = 3;
  // Member's current phase, so collapsed / out-of-window rows can render
  // status without the full action being hydrated in the window.
  common.ActionPhase phase = 4;
  // Member's start time (mirrors ActionStatus.start_time), for the mini
  // table start-time column on collapsed / out-of-window rows.
  google.protobuf.Timestamp start_time = 5;
}

// GroupAggregations carries the four top-3 outlier lists for a group.
// Each list holds the three descendant actions (deep rollup over the
// group's whole subtree) with the largest metric, sorted DESC.
message GroupAggregations {
  // Descendants in terminal FAILED phase, by total duration.
  repeated ActionLeaf failed = 1;
  // By total wall-clock duration (created → ended).
  repeated ActionLeaf longest_duration = 2;
  // By time spent in RUNNING phase.
  repeated ActionLeaf longest_running = 3;
  // By setup time = total duration − running duration.
  repeated ActionLeaf longest_setup = 4;
}

// GroupNode is the synthetic (parent, action_group) folder. The
// server emits one of these in place of a contiguous block of
// sibling actions sharing an action_group.
message GroupNode {
  // Synthetic key — "{parent_action_id}::group::{group_name}".
  string id = 1;
  string group_name = 2;
  string parent_id = 3;

  // Per-phase member counts (key = ActionPhase enum value).
  map<int32, int32> child_phase_counts = 4;

  // Earliest StartedAt across members; unset until any member starts.
  google.protobuf.Timestamp earliest_start_time = 5;
  // Latest EndedAt across members; unset while any member is still
  // running.
  google.protobuf.Timestamp latest_end_time = 6;

  int32 total_children = 7;
  bool meets_filter = 8;

  GroupAggregations aggregations = 9;
}

// TruncationNotice tells the client that the response is incomplete
// due to a hard cap. Sent sticky — server keeps re-attaching the
// notice until receipt is confirmed via a subsequent client message.
message TruncationNotice {
  enum Reason {
    REASON_UNSPECIFIED = 0;
    // MaxActionsPerRun hit — the run has more actions than the store tracks.
    REASON_RUN_NODE_LIMIT = 1;
    // MaxChildrenPerParent hit — at least one parent has more children than tracked.
    REASON_PARENT_CHILD_LIMIT = 2;
    // Transient; the store is still hydrating from the DB.
    REASON_HYDRATING = 3;
  }
  Reason reason = 1;
  int64 tracked_action_count = 2;
  int64 known_total_action_count = 3;
  string message = 4;
}

message WatchClusterEventsRequest {
  common.ActionIdentifier id = 1 [(buf.validate.field).required = true];

  uint32 attempt = 2 [(buf.validate.field).uint32.gt = 0];
}

message WatchClusterEventsResponse {
  repeated ClusterEvent cluster_events = 1;
}

message AbortActionRequest {
  // Action to abort.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];

  // Optional reason for aborting the action.
  string reason = 2;
}

message AbortActionResponse {}

// EventPayload carries the typed value for a condition signal. This is the
// user-facing simplified payload surface — the run service converts it to a
// core.Literal before forwarding to ActionsService.Signal. Exactly one field
// must be set, matching the condition's declared type.
message EventPayload {
  oneof value {
    option (buf.validate.oneof).required = true;
    bool bool_value = 1;
    int64 int_value = 2;
    double float_value = 3;
    string string_value = 4;
  }
}

// Request message for signalling a condition action within a run.
message SignalEventRequest {
  // The condition action to signal.
  common.ActionIdentifier action_id = 1 [(buf.validate.field).required = true];

  // The parent action that owns the condition. Used to route the request to
  // the correct actions-service shard (partitioned by parent action name).
  string parent_action_name = 2;

  // The value to signal the condition with. Must match the condition's
  // declared type.
  EventPayload payload = 3 [(buf.validate.field).required = true];
}

message SignalEventResponse {}

message WatchGroupsRequest {
  oneof scope_by {
    option (buf.validate.oneof).required = true;
    // Watch groups within a project.
    common.ProjectIdentifier project_id = 1;
  }

  // Filter groups after this date (inclusive). Required.
  google.protobuf.Timestamp start_date = 2 [(buf.validate.field).required = true];

  // Filter groups before this date (inclusive).
  // If null, will stream updates up to current time.
  // If not null, will return groups once and close stream.
  google.protobuf.Timestamp end_date = 3;

  // Common list request parameters.
  common.ListRequest request = 4;

  message KnownSortField {
    oneof sort_by {
      common.Sort.Direction created_at = 1;
    }
  }

  // Known sort fields in watch group
  repeated KnownSortField known_sort_fields = 5;
}

// Response message for watching task groups.
message WatchGroupsResponse {
  // List of task groups matching the filter criteria.
  // For the initial response, this contains all groups.
  // For subsequent updates, this contains only changed groups.
  repeated TaskGroup task_groups = 1;

  // Indicates when the initial List call is complete, and subsequent messages are updates.
  bool sentinel = 2;
}
