syntax = "proto3";

package flyteidl2.notification;

import "buf/validate/validate.proto";
import "flyteidl2/common/identifier.proto";
import "flyteidl2/common/phase.proto";

option go_package = "github.com/flyteorg/flyte/v2/gen/go/flyteidl2/notification";

message DeliveryConfigTemplate {
  option (buf.validate.message).cel = {
    id: "at_least_one_required"
    message: "at least one of the delivery options must be set"
    expression: "has(this.webhook) || has(this.email)"
  };

  WebhookDeliveryTemplate webhook = 1;

  EmailDeliveryTemplate email = 2;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_RUN_COMPLETED = 1;
}

message RunCompletedNotificationTemplateData {
  common.RunIdentifier run = 1 [(buf.validate.field).required = true];

  common.ActionPhase phase = 2;

  string error = 3;
}

enum HttpMethod {
  HTTP_METHOD_UNSPECIFIED = 0;
  HTTP_METHOD_GET = 1;
  HTTP_METHOD_HEAD = 2;
  HTTP_METHOD_POST = 3;
  HTTP_METHOD_PUT = 4;
  HTTP_METHOD_DELETE = 5;
  HTTP_METHOD_CONNECT = 6;
  HTTP_METHOD_OPTIONS = 7;
  HTTP_METHOD_TRACE = 8;
  HTTP_METHOD_PATCH = 9;
}

message WebhookDeliveryTemplate {
  string url = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 2000
  }];

  HttpMethod method = 2 [(buf.validate.field).enum = {
    not_in: [0]
  }];

  map<string, string> headers = 3 [(buf.validate.field).map = {
    keys: {
      string: {
        min_len: 1
        max_len: 20
      }
    }
    values: {
      string: {
        min_len: 1
        max_len: 50
      }
    }
    max_pairs: 20
  }];

  string body_template = 4; // this is a Go template that may contain placeholders
}

message EmailRecipient {
  string name = 1;

  string address = 2;
}

message ProviderEmailTemplate {
  string template_id = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];

  map<string, string> template_data = 2 [(buf.validate.field).map = {
    keys: {
      string: {
        min_len: 1
        max_len: 100
      }
    }
    values: {
      string: {max_len: 4000}
    }
    max_pairs: 100
  }];
}

message EmailDeliveryTemplate {
  option (buf.validate.message).cel = {
    id: "inline_email_or_provider_template_required"
    message: "either inline email subject/html_template or provider_template must be set"
    expression: "(has(this.provider_template) && size(this.subject) == 0 && size(this.html_template) == 0 && size(this.text_template) == 0) || (!has(this.provider_template) && size(this.subject) > 0 && size(this.html_template) > 0)"
  };

  string subject = 1; // this is a Go template that may contain placeholders

  repeated EmailRecipient to = 2 [(buf.validate.field).repeated.min_items = 1];

  repeated EmailRecipient cc = 3;

  repeated EmailRecipient bcc = 4;

  string html_template = 5; // this is a Go template that may contain placeholders

  string text_template = 6; // this is a Go template that may contain placeholders

  ProviderEmailTemplate provider_template = 7;
}
